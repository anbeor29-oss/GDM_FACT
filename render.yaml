# ============================================================================
# render.yaml — Blueprint del ENTORNO **GDM_ALMACEN** (rama `almacen`)
#
# Segundo despliegue independiente del mismo código, con su PROPIA base de datos
# y sus propios servicios. NO comparte nada con producción (`gdmfac`).
#
# Levanta 3 recursos:
#   1) PostgreSQL 15                 → gdm-almacen-postgres
#   2) Backend Node/Express          → gdm-almacen-backend
#   3) Frontend React/Vite estático  → gdm-almacen-frontend
#
# Uso desde Render:
#   Dashboard → New → Blueprint → conecta el repo → **Branch: almacen** → Apply
#
# En el primer arranque el backend corre migraciones y luego `bootstrap:env`,
# que crea la empresa + un admin ADMIN_ALL + datos de ejemplo (ver variables
# BOOTSTRAP_* abajo). Los secretos (SW_SAPIEN_TOKEN, BOOTSTRAP_ADMIN_PASSWORD)
# van `sync: false`: Render los pide al hacer Apply. Nunca se guardan en git.
# ============================================================================

databases:
  - name: gdm-almacen-postgres
    # OJO: Render permite 1 Postgres FREE por cuenta. Si el free ya lo usa
    # `gdmfac`, cambia esto a `basic-256mb` (~$6 USD/mes) o libera el otro.
    plan: free
    databaseName: gdm_almacen
    user: gdm_almacen
    postgresMajorVersion: 15
    ipAllowList: []       # Solo conexiones desde los servicios de Render

services:
  # ─── Backend Node/Express ──────────────────────────────────────────
  - type: web
    name: gdm-almacen-backend
    runtime: node
    plan: starter         # $7/mes — Render no ofrece "free" para web vía Blueprint
    region: oregon
    branch: almacen       # este entorno sigue la rama almacen
    rootDir: backend
    # --include=dev instala devDependencies (typescript, @types/*) para compilar.
    buildCommand: npm ci --include=dev && npm run build
    # 1) migraciones (aborta el boot si fallan)  2) bootstrap idempotente y NO
    # fatal (crea empresa + admin ADMIN_ALL + ejemplos)  3) arranca el server.
    # JS plano en ambos scripts: en runtime NO hay devDeps (ni ts-node).
    startCommand: "npm run migrate:up && (npm run bootstrap:env || true) && node dist/index.js"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: v1
      - key: LOG_LEVEL
        value: info

      # ─── Conexión BD: Render inyecta la de gdm-almacen-postgres ──────
      - key: DATABASE_URL
        fromDatabase:
          name: gdm-almacen-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"

      # ─── Redis opcional (modo degradado sin caché) ──────────────────
      - key: REDIS_HOST
        value: ""

      # ─── Secretos autogenerados por Render ──────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CSD_MASTER_KEY
        generateValue: true
      - key: JWT_EXPIRATION
        value: 1h
      - key: JWT_REFRESH_EXPIRATION
        value: 7d

      # ─── PAC SW Sapien: pega el token al hacer Apply ────────────────
      - key: PAC_PROVIDER
        value: SW_SAPIEN
      - key: SW_SAPIEN_ENV
        value: sandbox
      - key: SW_SAPIEN_TOKEN
        sync: false        # SECRETO — se pide en el Apply

      # ─── CORS: URL completa del frontend de este entorno ────────────
      - key: CORS_ORIGIN
        value: "https://gdm-almacen-frontend.onrender.com"
      - key: CORS_CREDENTIALS
        value: "true"

      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: FEATURE_PAC_INTEGRATION
        value: "true"
      - key: MOCK_PAC
        value: "false"

      # ─── Bootstrap del primer arranque (empresa + admin ADMIN_ALL) ──
      # El admin nace con grupo de trabajo ADMIN_ALL (ve todos los módulos).
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: "admin@gdmalmacen.mx"
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false        # SECRETO — pega la clave que se te generó, en el Apply
      - key: BOOTSTRAP_ADMIN_FIRST_NAME
        value: "Admin"
      - key: BOOTSTRAP_ADMIN_LAST_NAME
        value: "General"
      - key: BOOTSTRAP_COMPANY_RFC
        value: "EKU9003173C9"
      - key: BOOTSTRAP_COMPANY_NAME
        value: "GDM ALMACEN DEMO"
      - key: BOOTSTRAP_COMPANY_REGIME
        value: "601"
      - key: BOOTSTRAP_COMPANY_CP
        value: "20000"
      - key: BOOTSTRAP_COMPANY_STATE
        value: "01"
      - key: BOOTSTRAP_SEED_EXAMPLES
        value: "true"

  # ─── Frontend React/Vite estático (tier free ilimitado) ────────────
  - type: web
    name: gdm-almacen-frontend
    runtime: static
    branch: almacen
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: gdm-almacen-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL   # https://gdm-almacen-backend.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
