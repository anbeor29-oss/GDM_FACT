# ============================================================================
# render.yaml — Blueprint de infraestructura para Render.com
#
# Levanta 3 servicios como un solo grupo:
#   1) PostgreSQL 15                 → base de datos
#   2) Backend Node/Express          → API REST
#   3) Frontend React/Vite estático  → UI
#
# Uso desde Render:
#   Dashboard → New → Blueprint → conecta el repo → Apply
#   Render lee este archivo y crea los 3 recursos automáticamente.
#
# Variables sensibles (SW_SAPIEN_TOKEN, JWT_SECRET, etc.) NO van aquí:
# se marcan `sync: false` y se rellenan a mano desde el dashboard tras el
# primer deploy. Así nunca terminan en git.
# ============================================================================

databases:
  - name: gdmfac-postgres
    plan: free            # 90 días de retención; upgrade a Basic ($7/mes) para prod
    databaseName: cfdi_erp
    user: cfdi_app
    postgresMajorVersion: 15
    ipAllowList: []       # Solo conexiones desde los servicios de Render

services:
  # ─── Backend Node/Express ──────────────────────────────────────────
  - type: web
    name: gdmfac-backend
    runtime: node
    plan: starter         # $7/mes — Render descontinuó "free" para web services vía Blueprint
    region: oregon        # más cercano a MX que virginia; ~110 ms latencia
    branch: main
    rootDir: backend
    # --include=dev fuerza a instalar devDependencies (typescript, @types/*)
    # incluso con NODE_ENV=production — necesario para compilar TS a JS.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    autoDeploy: true      # cada push a main dispara deploy
    envVars:
      - key: NODE_ENV
        value: production
      # Render inyecta $PORT automáticamente en runtime — el código lo prefiere
      # sobre APP_PORT. No hay que hardcodearlo aquí.
      - key: API_VERSION
        value: v1
      - key: LOG_LEVEL
        value: info

      # ─── Conexión BD: Render inyecta automáticamente ──────────────
      - key: DATABASE_URL
        fromDatabase:
          name: gdmfac-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"      # Render fuerza SSL en su Postgres

      # ─── Redis: opcional, la app arranca sin él ──────────────────
      - key: REDIS_HOST
        value: ""          # dejar vacío = modo degradado sin caché

      # ─── Secretos (rellenar EN EL DASHBOARD tras deploy) ──────────
      - key: JWT_SECRET
        generateValue: true          # Render genera uno seguro
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CSD_MASTER_KEY
        generateValue: true

      - key: JWT_EXPIRATION
        value: 1h
      - key: JWT_REFRESH_EXPIRATION
        value: 7d

      # ─── PAC SW Sapien: pegar token del panel a mano ──────────────
      - key: PAC_PROVIDER
        value: SW_SAPIEN
      - key: SW_SAPIEN_ENV
        value: sandbox
      - key: SW_SAPIEN_TOKEN
        sync: false        # SECRETO: se llena a mano desde Environment tab

      # ─── CORS: URLs completas de los frontends (con https://) ─────
      # No se puede usar `fromService` porque Render inyecta solo el host sin
      # protocolo (`gdmfac-frontend.onrender.com`) y el middleware CORS del
      # backend compara con el header Origin que SÍ incluye protocolo.
      #
      # Son DOS frontends contra este mismo backend:
      #   · gdmfac-frontend.onrender.com → el estático de Render
      #   · hcgm.com.mx (/erp)           → el hosting de México (zip a cPanel)
      # Si falta un origen, el navegador bloquea TODA petición desde él —
      # incluido el login, que se ve como "ningún usuario funciona".
      # Se listan con y sin www porque son orígenes distintos para el navegador.
      - key: CORS_ORIGIN
        value: "https://gdmfac-frontend.onrender.com,https://hcgm.com.mx,https://www.hcgm.com.mx"
      - key: CORS_CREDENTIALS
        value: "true"

      # ─── Rate limit ───────────────────────────────────────────────
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

      # ─── Feature flags ────────────────────────────────────────────
      - key: FEATURE_PAC_INTEGRATION
        value: "true"
      - key: MOCK_PAC
        value: "false"

  # ─── Frontend React/Vite estático ──────────────────────────────────
  # Los sitios estáticos SÍ tienen tier gratuito ilimitado — no lleva `plan`.
  - type: web
    name: gdmfac-frontend
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    # SPA: cualquier ruta → index.html (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Vite inyecta las VITE_* en build time
      - key: VITE_API_BASE
        fromService:
          name: gdmfac-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL   # https://gdmfac-backend.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
