name: QA E2E

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Lunes 06:00 UTC — gate semanal con multi-browser

jobs:
  smoke:
    name: Smoke gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cfdi_erp
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Apply schema
        env: { PGPASSWORD: postgres }
        run: |
          psql -h localhost -U postgres -d cfdi_erp -f backend/src/database/schema.sql
          # Migraciones aplicadas a la BD limpia
          for f in backend/src/database/migrations/*.sql; do
            psql -h localhost -U postgres -d cfdi_erp -f "$f" || true
          done

      - name: Install backend
        working-directory: backend
        run: npm ci

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Start backend
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: cfdi_erp
          JWT_SECRET: ci-secret
        run: |
          nohup npm run dev > /tmp/be.log 2>&1 &
          for i in {1..20}; do
            curl -sf http://localhost:3000/health && break || sleep 2
          done

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run dev > /tmp/fe.log 2>&1 &
          for i in {1..20}; do
            curl -sf http://localhost:5173 && break || sleep 2
          done

      - name: Install QA suite
        working-directory: tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Smoke tests (gate)
        working-directory: tests
        run: npm run test:smoke

      - name: Regression + Security + A11Y
        working-directory: tests
        run: npx playwright test --grep "@regression|@security|@a11y"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report
          retention-days: 14

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: tests/reports/junit.xml

  weekly-cross-browser:
    name: Weekly Firefox + WebKit
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run full suite on all browsers
        working-directory: tests
        env: { BROWSERS: 'all' }
        run: |
          npm ci
          npx playwright install --with-deps
          npm test
